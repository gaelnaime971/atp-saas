<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  <!-- Candlestick chart icon -->
  <!-- Candle 1 - bearish (red wick) -->
  <line x1="8" y1="8" x2="8" y2="24" stroke="#5a6a82" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="6" y="12" width="4" height="6" rx="0.5" fill="#ef4444"/>
  <!-- Candle 2 - bullish (green, taller) -->
  <line x1="16" y1="6" x2="16" y2="22" stroke="#5a6a82" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="14" y="9" width="4" height="8" rx="0.5" fill="#22c55e"/>
  <!-- Candle 3 - bullish (green, highest) -->
  <line x1="24" y1="4" x2="24" y2="20" stroke="#5a6a82" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="22" y="7" width="4" height="7" rx="0.5" fill="#22c55e"/>
</svg>
